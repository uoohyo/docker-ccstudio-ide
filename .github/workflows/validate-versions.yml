name: Validate CCS Download URLs

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scrape CCS versions from TI
        id: scrape
        run: |
          echo "Fetching all CCS versions from TI website..."
          VERSIONS=$(bash .github/scripts/parse-versions.sh)

          LINUX_COUNT=$(echo "$VERSIONS" | jq '[.[] | select(.linux_supported != false)] | length')
          echo "Total versions  : $(echo "$VERSIONS" | jq '. | length')"
          echo "Linux-supported : ${LINUX_COUNT}"

          DELIMITER=$(openssl rand -hex 8)
          { echo "versions<<${DELIMITER}"; echo "${VERSIONS}"; echo "${DELIMITER}"; } >> $GITHUB_OUTPUT

      - name: Validate download URLs
        id: validate
        env:
          VERSIONS: ${{ steps.scrape.outputs.versions }}
        run: |
          echo "$VERSIONS" | node .github/scripts/validate-urls.js
