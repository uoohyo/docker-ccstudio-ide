name: Build All CCS Versions

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      versions:
        description: 'Versions to build (JSON array, leave empty for auto-detect via scraper)'
        required: false
        default: ''
      force_rebuild:
        description: 'Force rebuild even if already on Docker Hub'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
      build_versions: ${{ steps.parse.outputs.build_versions }}
      latest_version: ${{ steps.parse.outputs.latest_version }}
      has_versions: ${{ steps.parse.outputs.has_versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: github.event.inputs.versions == ''
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Parse CCS versions
        id: parse
        run: |
          # Use manual input if provided
          if [ -n "${{ github.event.inputs.versions }}" ]; then
            VERSIONS='${{ github.event.inputs.versions }}'
          else
            VERSIONS=$(bash .github/scripts/parse-versions.sh)
          fi

          # All versions (for documentation / check-new-version.yml)
          DELIMITER=$(openssl rand -hex 8)
          { echo "versions<<${DELIMITER}"; echo "${VERSIONS}"; echo "${DELIMITER}"; } >> $GITHUB_OUTPUT

          # Publicly downloadable versions only (for the build matrix), sorted oldest-first
          ALL_BUILD_VERSIONS=$(echo "$VERSIONS" | jq '[.[] | select(.public_download == true)] | sort_by([.major, .minor, .patch, .build] | map(tonumber))')

          # Filter out already-built versions unless force_rebuild is requested
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            BUILD_VERSIONS="$ALL_BUILD_VERSIONS"
            echo "force_rebuild=true: building all $(echo "$BUILD_VERSIONS" | jq '. | length') versions"
          else
            echo "Checking Docker Hub for existing tags..."
            EXISTING_TAGS=""
            PAGE=1
            while true; do
              RESPONSE=$(curl -s "https://hub.docker.com/v2/repositories/uoohyo/ccstudio-ide/tags?page=${PAGE}&page_size=100")
              TAGS=$(echo "$RESPONSE" | jq -r '.results[].name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$' || true)
              [ -z "$TAGS" ] && break
              EXISTING_TAGS="${EXISTING_TAGS}${TAGS}"$'\n'
              NEXT=$(echo "$RESPONSE" | jq -r '.next')
              [ "$NEXT" = "null" ] && break
              PAGE=$((PAGE + 1))
            done
            TAGS_JSON=$(echo "$EXISTING_TAGS" | grep -v '^$' | jq -R . | jq -s . || echo '[]')
            echo "Found $(echo "$TAGS_JSON" | jq '. | length') existing Docker Hub tags"

            # Keep only versions not yet on Docker Hub
            BUILD_VERSIONS=$(echo "$ALL_BUILD_VERSIONS" | jq --argjson tags "$TAGS_JSON" \
              '[.[] | select(.version as $v | ($tags | index($v)) == null)]')
            echo "Versions to build: $(echo "$BUILD_VERSIONS" | jq '. | length') (skipping already-built)"
          fi

          DELIMITER2=$(openssl rand -hex 8)
          { echo "build_versions<<${DELIMITER2}"; echo "${BUILD_VERSIONS}"; echo "${DELIMITER2}"; } >> $GITHUB_OUTPUT

          # Latest = highest version among ALL buildable (not just new), for tag-latest
          LATEST=$(echo "$ALL_BUILD_VERSIONS" | jq -r '.[-1].version')
          echo "latest_version=${LATEST}" >> $GITHUB_OUTPUT

          # Flag to skip build/push matrix when nothing new to build
          VERSION_COUNT=$(echo "$BUILD_VERSIONS" | jq '. | length')
          if [ "$VERSION_COUNT" -gt 0 ]; then
            echo "has_versions=true" >> $GITHUB_OUTPUT
          else
            echo "has_versions=false" >> $GITHUB_OUTPUT
            echo "All versions are already on Docker Hub — skipping build and push"
          fi

          echo "Total versions: $(echo "$VERSIONS" | jq '. | length')"
          echo "Linux-supported: $(echo "$ALL_BUILD_VERSIONS" | jq '. | length')"
          echo "To build: ${VERSION_COUNT}"
          echo "Latest: ${LATEST}"

  build:
    needs: detect-versions
    if: needs.detect-versions.outputs.has_versions == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 10
      matrix:
        version_info: ${{ fromJson(needs.detect-versions.outputs.build_versions) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Determine base image for version
        id: base-image
        run: |
          MAJOR="${{ matrix.version_info.major }}"

          # Select base image based on CCS version
          # Based on official TI documentation and community testing
          if [ "$MAJOR" -le 8 ]; then
            BASE_IMAGE="ubuntu:16.04"
            echo "Using Ubuntu 16.04 for CCS v${MAJOR} (BitRock installer compatibility)"
          elif [ "$MAJOR" -le 11 ]; then
            BASE_IMAGE="ubuntu:20.04"
            echo "Using Ubuntu 20.04 for CCS v${MAJOR} (officially tested)"
          elif [ "$MAJOR" -le 19 ]; then
            BASE_IMAGE="ubuntu:22.04"
            echo "Using Ubuntu 22.04 for CCS v${MAJOR} (officially tested)"
          else
            BASE_IMAGE="ubuntu:24.04"
            echo "Using Ubuntu 24.04 for CCS v${MAJOR} (officially supported)"
          fi

          echo "base_image=${BASE_IMAGE}" >> $GITHUB_OUTPUT

      - name: Build version-specific image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          provenance: false
          build-args: |
            BASE_IMAGE=${{ steps.base-image.outputs.base_image }}
            CCS_VERSION=${{ matrix.version_info.version }}
            MAJOR_VER=${{ matrix.version_info.major }}
            MINOR_VER=${{ matrix.version_info.minor }}
            PATCH_VER=${{ matrix.version_info.patch }}
            BUILD_VER=${{ matrix.version_info.build }}
          tags: |
            uoohyo/ccstudio-ide:${{ matrix.version_info.version }}
          cache-from: type=gha,scope=build-${{ matrix.version_info.version }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.version_info.version }}

      - name: Test image with full CCS installation
        run: |
          IMAGE="uoohyo/ccstudio-ide:${{ matrix.version_info.version }}"
          VERSION="${{ matrix.version_info.version }}"
          MAJOR="${{ matrix.version_info.major }}"

          echo "=========================================="
          echo "Testing CCS ${VERSION} installation"
          echo "=========================================="

          # Start container and wait for installation to complete
          echo "→ Starting container and installing CCS (this may take 3-5 minutes)..."
          CONTAINER_ID=$(docker run -d -e COMPONENTS=PF_C28 "${IMAGE}" sleep infinity)

          # Wait for installation to complete (check for log message)
          echo "→ Waiting for CCS installation to complete (monitoring logs)..."
          MAX_WAIT=600  # 10 minutes timeout
          ELAPSED=0
          INSTALLED=false

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Check logs for "=== CCS x.x.x.x is ready. ===" message
            LOGS=$(docker logs "$CONTAINER_ID" 2>&1)
            if echo "$LOGS" | grep -q "=== CCS .* is ready. ==="; then
              INSTALLED=true
              READY_MESSAGE=$(echo "$LOGS" | grep "=== CCS .* is ready. ===" | tail -1)
              echo "✓ ${READY_MESSAGE}"
              break
            fi

            # Check if container exited with error
            STATUS=$(docker ps -a --filter "id=$CONTAINER_ID" --format "{{.Status}}" 2>/dev/null)
            if echo "$STATUS" | grep -q "Exited (1)"; then
              echo "❌ FAILED: Container exited with error during installation"
              echo "→ Last 20 log lines:"
              docker logs "$CONTAINER_ID" 2>&1 | tail -20
              docker rm -f "$CONTAINER_ID"
              exit 1
            fi

            sleep 10
            ELAPSED=$((ELAPSED + 10))
            echo "   ... waiting (${ELAPSED}s elapsed)"
          done

          if [ "$INSTALLED" = false ]; then
            echo "❌ FAILED: CCS installation did not complete within ${MAX_WAIT} seconds"
            echo "→ Last 30 log lines:"
            docker logs "$CONTAINER_ID" 2>&1 | tail -30
            docker rm -f "$CONTAINER_ID"
            exit 1
          fi

          echo "✓ CCS installation completed in ${ELAPSED} seconds"

          # Test CCS executable
          echo "→ Testing CCS executable..."
          if [ "$MAJOR" -ge 20 ]; then
            # v20+: ccs-server-cli.sh uses $PWD to locate its bundled node and plugins,
            # so it must be run from the eclipse directory.
            # Bare -help is not a valid flag; use -ccs.help with a required application.
            if ! docker exec "$CONTAINER_ID" bash -c \
              'mkdir -p /tmp/ccs_verify && cd /opt/ti/ccs/eclipse && ./ccs-server-cli.sh -noSplash -workspace /tmp/ccs_verify -application com.ti.ccs.apps.inspect -ccs.help 2>&1 | grep -q "Usage:"'; then
              echo "❌ FAILED: ccs-server-cli not working properly"
              docker rm -f "$CONTAINER_ID"
              exit 1
            fi
            echo "✓ ccs-server-cli is working"
          elif [ "$MAJOR" -ge 9 ]; then
            # v9-v12: Test eclipse at /opt/ti/ccs
            if ! docker exec "$CONTAINER_ID" /opt/ti/ccs/eclipse/eclipse -help 2>&1 | head -20 | grep -q "Eclipse"; then
              echo "❌ FAILED: eclipse not working properly"
              docker rm -f "$CONTAINER_ID"
              exit 1
            fi
            echo "✓ eclipse is working"
          else
            # v8 and below: Test eclipse at /opt/ti/ccsv{MAJOR}
            if ! docker exec "$CONTAINER_ID" /opt/ti/ccsv${MAJOR}/eclipse/eclipse -help 2>&1 | head -20 | grep -q "Eclipse"; then
              echo "❌ FAILED: eclipse not working properly"
              docker rm -f "$CONTAINER_ID"
              exit 1
            fi
            echo "✓ eclipse is working"
          fi

          # Cleanup
          docker rm -f "$CONTAINER_ID"

          echo "=========================================="
          echo "✅ All tests passed for CCS ${VERSION}"
          echo "=========================================="

  push:
    needs: [detect-versions, build]
    if: needs.detect-versions.outputs.has_versions == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        version_info: ${{ fromJson(needs.detect-versions.outputs.build_versions) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine base image for version
        id: base-image
        run: |
          MAJOR="${{ matrix.version_info.major }}"

          if [ "$MAJOR" -le 8 ]; then
            BASE_IMAGE="ubuntu:16.04"
          elif [ "$MAJOR" -le 11 ]; then
            BASE_IMAGE="ubuntu:20.04"
          elif [ "$MAJOR" -le 19 ]; then
            BASE_IMAGE="ubuntu:22.04"
          else
            BASE_IMAGE="ubuntu:24.04"
          fi

          echo "base_image=${BASE_IMAGE}" >> $GITHUB_OUTPUT

      - name: Build image from cache
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          provenance: false
          build-args: |
            BASE_IMAGE=${{ steps.base-image.outputs.base_image }}
            CCS_VERSION=${{ matrix.version_info.version }}
            MAJOR_VER=${{ matrix.version_info.major }}
            MINOR_VER=${{ matrix.version_info.minor }}
            PATCH_VER=${{ matrix.version_info.patch }}
            BUILD_VER=${{ matrix.version_info.build }}
          tags: |
            uoohyo/ccstudio-ide:${{ matrix.version_info.version }}
          cache-from: type=gha,scope=build-${{ matrix.version_info.version }}

      - name: Push image with retry
        run: |
          IMAGE="uoohyo/ccstudio-ide:${{ matrix.version_info.version }}"
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "→ Push attempt ${i}/${MAX_RETRIES}..."
            if docker push "${IMAGE}"; then
              echo "✅ Image pushed: ${IMAGE}"
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "⚠️ Push failed (attempt ${i}/${MAX_RETRIES}), retrying in 60s..."
              sleep 60
            fi
          done
          echo "❌ Push failed after ${MAX_RETRIES} attempts"
          exit 1

  tag-latest:
    needs: [detect-versions, push]
    runs-on: ubuntu-latest
    if: '!cancelled()'
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push latest
        run: |
          BUILT_VERSION="${{ needs.detect-versions.outputs.latest_version }}"

          # Fetch all existing tags from Docker Hub to find actual latest
          EXISTING_TAGS=$(curl -s "https://hub.docker.com/v2/repositories/uoohyo/ccstudio-ide/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$' || echo "")

          # Combine existing tags with the version just built
          ALL_TAGS=$(printf "%s\n%s" "$EXISTING_TAGS" "$BUILT_VERSION" | grep -v '^$')

          # Find actual latest by version sort
          ACTUAL_LATEST=$(echo "$ALL_TAGS" | sort -V | tail -1)

          echo "Built version: ${BUILT_VERSION}"
          echo "Actual latest across all tags: ${ACTUAL_LATEST}"

          docker pull uoohyo/ccstudio-ide:${ACTUAL_LATEST}
          docker tag uoohyo/ccstudio-ide:${ACTUAL_LATEST} uoohyo/ccstudio-ide:latest
          docker push uoohyo/ccstudio-ide:latest

  handle-failure:
    needs: [detect-versions, build, push]
    runs-on: ubuntu-latest
    # Only run on the first attempt — re-runs inherit attempt 1's failure state,
    # causing failure() to evaluate true even when re-run jobs all succeed.
    if: failure() && !cancelled() && github.run_attempt == 1
    permissions:
      issues: write
    steps:
      - name: Mark building issue as failed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Find open issues with "building" label
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'building'
            });

            if (issues.data.length === 0) {
              console.log('No building issues found');
              return;
            }

            // Process each building issue
            for (const issue of issues.data) {
              console.log(`Marking issue #${issue.number} as failed`);

              // Add failure comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ **Build failed**\n\nSome versions failed to build. Please check the [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nThis issue will remain open for investigation.`
              });

              // Add "failed" label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['failed']
              });

              // Remove "building" label
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'building'
              });

              console.log(`Issue #${issue.number} marked as failed`);
            }
