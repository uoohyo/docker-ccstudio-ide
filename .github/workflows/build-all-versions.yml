name: Build All CCS Versions

on:
  push:
    branches: [main, develop]  # TESTING: Remove 'develop' before merging to main
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      versions:
        description: 'Versions to build (JSON array, leave empty for latest)'
        required: false
        default: ''

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.parse.outputs.versions }}
      latest_version: ${{ steps.parse.outputs.latest_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse CCS versions
        id: parse
        run: |
          # Use manual input if provided
          if [ -n "${{ github.event.inputs.versions }}" ]; then
            VERSIONS='${{ github.event.inputs.versions }}'
          else
            # Parse latest version from TI website
            VERSIONS=$(bash scripts/parse-versions.sh)
          fi

          echo "versions=${VERSIONS}" >> $GITHUB_OUTPUT

          # Extract latest version
          LATEST=$(echo "$VERSIONS" | jq -r '.[0].version')
          echo "latest_version=${LATEST}" >> $GITHUB_OUTPUT

          echo "Detected versions: ${VERSIONS}"
          echo "Latest version: ${LATEST}"

  build-and-push:
    needs: detect-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version_info: ${{ fromJson(needs.detect-versions.outputs.versions) }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push version-specific image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false  # TESTING: Set to true before production
          build-args: |
            CCS_VERSION=${{ matrix.version_info.version }}
            MAJOR_VER=${{ matrix.version_info.major }}
            MINOR_VER=${{ matrix.version_info.minor }}
            PATCH_VER=${{ matrix.version_info.patch }}
            BUILD_VER=${{ matrix.version_info.build }}
          tags: |
            uoohyo/ccstudio-ide:${{ matrix.version_info.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          load: true  # Load image locally for testing

  tag-latest:
    needs: [detect-versions, build-and-push]
    runs-on: ubuntu-latest
    if: false  # TESTING: Disable for testing, enable before production
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push latest
        run: |
          LATEST_VERSION="${{ needs.detect-versions.outputs.latest_version }}"
          echo "Tagging ${LATEST_VERSION} as latest"

          docker pull uoohyo/ccstudio-ide:${LATEST_VERSION}
          docker tag uoohyo/ccstudio-ide:${LATEST_VERSION} uoohyo/ccstudio-ide:latest
          docker push uoohyo/ccstudio-ide:latest
